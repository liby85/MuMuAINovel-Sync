name: 🔧 Patch Official Image & Build

on:
  schedule:
    # 每周日凌晨 2 点自动检查更新
    - cron: '0 2 * * 0'
  
  workflow_dispatch:
    inputs:
      rebuild:
        description: '强制重建镜像'
        required: false
        default: 'false'
        type: boolean

jobs:
  check-and-build:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📦 检出仓库
        uses: actions/checkout@v4
      
      - name: 🐳 登录 Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}
      
      - name: 🔍 检查官方镜像更新
        id: check
        run: |
          # 拉取官方镜像 latest
          docker pull xiamuceer-j/mumuainovel:latest || exit 1
          
          # 获取镜像 digest
          DIGEST=$(docker inspect --format='{{.Id}}' xiamuceer-j/mumuainovel:latest)
          echo "digest=$DIGEST" >> $GITHUB_OUTPUT
          
          # 检查是否有变化
          CACHE_FILE="/tmp/official_digest"
          if [ -f "$CACHE_FILE" ] && [ "$(cat $CACHE_FILE)" = "$DIGEST" ]; then
            if [ "${{ github.event.inputs.rebuild }}" != "true" ]; then
              echo "📦 官方镜像没有更新，跳过构建"
              echo "skip=true" >> $GITHUB_OUTPUT
            else
              echo "skip=false" >> $GITHUB_OUTPUT
            fi
          else
            echo "$DIGEST" > "$CACHE_FILE"
            echo "skip=false" >> $GITHUB_OUTPUT
          fi
      
      - name: 🐳 构建并推送打补丁的镜像
        if: steps.check.outputs.skip == 'false'
        run: |
          docker build \
            --build-arg BASE_IMAGE=xiamuceer-j/mumuainovel:latest \
            -t liby85/mumuainovel-singleuser:latest \
            -t liby85/mumuainovel-singleuser:${{ steps.check.outputs.digest }} \
            .
          
          docker push liby85/mumuainovel-singleuser:latest
          docker push liby85/mumuainovel-singleuser:${{ steps.check.outputs.digest }}
          
          echo "✅ 镜像构建并推送完成！"