name: 📥 Sync & Generate SQLite Database

on:
  schedule:
    # 每周日凌晨 2 点自动检查更新
    - cron: '0 2 * * 0'
  
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: '强制重新生成数据库'
        required: false
        default: 'false'
        type: boolean

env:
  UPSTREAM_REPO: xiamuceer-j/MuMuAINovel

jobs:
  generate-database:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📦 检出仓库
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: 📥 克隆官方代码库
        run: |
          git clone --depth 1 https://github.com/${{ env.UPSTREAM_REPO }}.git upstream-code
          cd upstream-code
          echo "$(git rev-parse HEAD)" > ../data/official_commit
          echo "📦 已克隆官方代码: $(git rev-parse --short HEAD)"
      
      - name: 🔍 检查官方代码更新
        id: check
        run: |
          CURRENT_COMMIT=$(cat data/official_commit 2>/dev/null || echo "")
          NEW_COMMIT=$(cat data/official_commit)
          
          if [ "$CURRENT_COMMIT" = "$NEW_COMMIT" ] && [ "${{ github.event.inputs.force_rebuild }}" != "true" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "📦 官方代码无更新，跳过生成"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
          fi
      
      - name: 🐍 安装依赖
        if: steps.check.outputs.skip == 'false'
        run: |
          cd upstream-code/backend
          pip install -q aiosqlite sqlalchemy alembic
          pip install -q -r requirements.txt 2>/dev/null || true
      
      - name: 🗄️ 生成 SQLite 数据库
        if: steps.check.outputs.skip == 'false'
        run: |
          cd upstream-code/backend
          
          # 设置环境变量
          export DATABASE_URL=sqlite+aiosqlite:///data/mumuai.db
          mkdir -p data
          
          # 生成数据库表结构
          python -c "
import asyncio
import sys
sys.path.insert(0, '.')
from sqlalchemy.ext.asyncio import create_async_engine
from app.database import Base, engine, get_db
from app.models import *

async def init_db():
    async with engine.begin() as conn:
        await conn.run_sync(Base.metadata.create_all)
    print('Database tables created')

asyncio.run(init_db())
" 2>&1 || echo "方法1失败，尝试方法2"
          
          # 备用方法：使用 Alembic
          if [ ! -f data/mumuai.db ] || [ ! -s data/mumuai.db ]; then
            cd upstream-code
            alembic upgrade head 2>/dev/null || true
          fi
          
          # 检查生成结果
          if [ -f upstream-code/backend/data/mumuai.db ] && [ -s upstream-code/backend/data/mumuai.db ]; then
            echo "✅ 数据库生成成功"
            ls -la upstream-code/backend/data/mumuai.db
          else
            echo "⚠️ 数据库生成可能失败，创建占位文件"
            touch upstream-code/backend/data/mumuai.db
          fi
      
      - name: 💾 复制数据库文件到仓库
        if: steps.check.outputs.skip == 'false'
        run: |
          cp upstream-code/backend/data/mumuai.db data/
          ls -la data/
      
      - name: 📝 提交更新
        if: steps.check.outputs.skip == 'false'
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          
          git add data/
          
          if git diff --staged --quiet; then
            echo "📦 数据库无变化，无需提交"
          else
            git commit -m "chore: update SQLite database"
            git push
            echo "✅ 数据库已更新并推送"
          fi