name: 📥 Sync & Generate SQLite Database

on:
  schedule:
    # 每周日凌晨 2 点自动检查更新
    - cron: '0 2 * * 0'
  
  workflow_dispatch:
    inputs:
      force_rebuild:
        description: '强制重新生成数据库'
        required: false
        default: 'false'
        type: boolean

env:
  UPSTREAM_REPO: xiamuceer-j/MuMuAINovel

jobs:
  generate-database:
    runs-on: ubuntu-latest
    
    steps:
      - name: 📦 检出仓库
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - name: 📥 克隆官方代码库
        run: |
          git clone --depth 1 https://github.com/${{ env.UPSTREAM_REPO }}.git upstream-code
          cd upstream-code
          NEW_COMMIT=$(git rev-parse HEAD)
          echo "$NEW_COMMIT" > ../data/official_commit_new
          echo "📦 已克隆官方代码: $(git rev-parse --short HEAD)"
      
      - name: 🔍 检查官方代码更新
        id: check
        run: |
          # 读取之前的官方版本
          CURRENT_COMMIT=$(cat data/official_commit 2>/dev/null || echo "")
          # 读取新克隆的版本
          NEW_COMMIT=$(cat data/official_commit_new)
          
          echo "当前版本: $CURRENT_COMMIT"
          echo "最新版本: $NEW_COMMIT"
          
          if [ "$CURRENT_COMMIT" = "$NEW_COMMIT" ] && [ "${{ github.event.inputs.force_rebuild }}" != "true" ]; then
            echo "skip=true" >> $GITHUB_OUTPUT
            echo "📦 官方代码无更新，跳过生成"
          else
            echo "skip=false" >> $GITHUB_OUTPUT
            echo "🔄 检测到官方代码有更新"
          fi
      
      - name: 🐍 安装依赖
        if: steps.check.outputs.skip == 'false'
        run: |
          cd upstream-code/backend
          pip install --quiet aiosqlite sqlalchemy alembic
          pip install --quiet -r requirements.txt 2>/dev/null || true
          echo "✅ 依赖安装完成"
      
      - name: 🗄️ 生成 SQLite 数据库
        if: steps.check.outputs.skip == 'false'
        run: |
          cd upstream-code/backend
          
          export DATABASE_URL=sqlite+aiosqlite:///data/mumuai.db
          mkdir -p data
          
          # 方法1: 使用 SQLAlchemy 创建表
          python -c "
import asyncio
import sys
import os
sys.path.insert(0, '.')
os.environ['DATABASE_URL'] = 'sqlite+aiosqlite:///data/mumuai.db'

from sqlalchemy.ext.asyncio import create_async_engine
from app.database import Base

async def init_db():
    engine = create_async_engine('sqlite+aiosqlite:///data/mumuai.db')
    async with engine.begin() as conn:
        await conn.run_sync(Base.metadata.create_all)
    await engine.dispose()
    print('Database tables created')

asyncio.run(init_db())
" 2>&1 || echo "方法1执行完成，尝试检查结果"
          
          # 检查结果
          if [ -f data/mumuai.db ] && [ -s data/mumuai.db ]; then
            echo "✅ 数据库生成成功: $(ls -lh data/mumuai.db)"
          else
            echo "⚠️ 创建空数据库文件"
            touch data/mumuai.db
          fi
      
      - name: 💾 复制数据库文件到仓库
        if: steps.check.outputs.skip == 'false'
        run: |
          cp upstream-code/backend/data/mumuai.db data/
          mv data/official_commit_new data/official_commit
          ls -la data/
      
      - name: 📝 提交更新
        if: steps.check.outputs.skip == 'false'
        run: |
          git config --global user.name "GitHub Actions Bot"
          git config --global user.email "actions@github.com"
          
          git add data/
          
          if git diff --staged --quiet; then
            echo "📦 数据库无变化，无需提交"
          else
            git commit -m "chore: update SQLite database"
            git push
            echo "✅ 数据库已更新并推送"
          fi